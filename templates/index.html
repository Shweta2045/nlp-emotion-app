<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLP Emotion & Sentiment Detector</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #333; margin-bottom: 20px; text-align: center; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; resize: none; }
        button { width: 100%; background: #4F46E5; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        button:hover { background: #4338CA; }
        .result-box { margin-top: 30px; padding: 20px; background: #EEF2FF; border-left: 5px solid #4F46E5; border-radius: 4px; }
        .metric { font-size: 18px; margin: 10px 0; color: #1E1B4B; }
        .score { font-weight: bold; color: #4F46E5; }
    </style>
</head>
<body>

<div class="container">
    <h2>Text Emotion & Sentiment Analyzer</h2>
    
    <form method="POST">
        <textarea name="user_text" placeholder="Apna sentence yahan likhein... (e.g., I am happy because today is my birthday)" required>{{ result.text if result else '' }}</textarea>
        <button type="submit">Analyze Text</button>
    </form>

    {% if result %}
    <div class="result-box">
        <h3>Analysis Results:</h3>
        <div class="metric">Sentiment: <span class="score">{{ result.sentiment }}</span> ({{ result.sentiment_conf }})</div>
        <div class="metric">Emotion: <span class="score">{{ result.emotion }}</span> ({{ result.emotion_conf }})</div>
    </div>
    {% endif %}
</div>

</body>
</html>
